@for (item of produtos(); track item){
    <app-produto 
    [nome] = "item.nome" 
    [preco] = "item.preco"
    (produtoSelecionado)="exibirProduto($event)"
    >
    </app-produto>
}
<p><button (click)="adicionarProduto()" >adicionar Prodution </button></p>
<h2>total de Produtos: {{totalProdutos()}} </h2>
<h3>valor total: {{valorTotal() | precoFormatado }} </h3>
